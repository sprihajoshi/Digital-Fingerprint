<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title id="page-title">Research Demo</title>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>

<div class="tooltip" id="tt"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo" id="nav-logo"></div>
  <div class="nav-links">
    <a onclick="goto('about')">About</a>
    <a onclick="goto('demo')">Demo</a>
    <a onclick="goto('highlights')">Highlights</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag" id="hero-tag"></div>
  <h1 id="hero-headline"></h1>
  <p id="hero-subheading"></p>
  <div class="hero-cta" id="hero-cta" onclick="goto('demo')"></div>
</section>

<!-- ABOUT -->
<section class="about" id="about">
  <div class="about-inner">
    <div>
      <div class="section-label" id="about-label"></div>
      <h2 id="about-heading"></h2>
      <p id="about-body"></p>
    </div>
    <div class="about-details" id="about-details"></div>
  </div>
</section>

<!-- DEMO -->
<section class="demo-section" id="demo">
  <div class="demo-header">
    <div class="section-label" id="demo-label"></div>
    <h2 id="demo-heading"></h2>
    <p id="demo-subheading"></p>
  </div>

  <!-- CONTROLS -->
  <div class="controls-row">
    <div class="controls-left">
      <div>
        <div class="file-selector-label">Files</div>
        <div class="chips" id="chips"></div>
      </div>
      <div>
        <div class="file-selector-label">View mode</div>
        <div class="mode-tabs">
          <div class="mode-tab active" id="tab-individual" onclick="setMode('individual')">Individual</div>
          <div class="mode-tab" id="tab-merged"     onclick="setMode('merged')">Merged</div>
          <div class="mode-tab" id="tab-overlaid"   onclick="setMode('overlaid')">Overlaid</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel" id="main-panel">

    <!-- TEXT SIDE -->
    <div class="text-side" id="text-side">
      <div class="text-side-header">
        <span class="text-side-label">Text</span>
      </div>
      <div class="tab-row" id="tab-row"></div>
      <div class="text-body" id="text-body">
        <div class="text-placeholder">Select a file to read its content</div>
      </div>
    </div>

    <!-- GRAPH SIDE -->
    <div class="graph-side">
      <div class="graph-side-header">
        <div class="graph-side-header-left">
          <button class="toggle-btn" onclick="toggleText()">
            <svg id="toggle-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" style="transition:transform 0.3s">
              <rect x="1" y="2" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/>
              <line x1="7.5" y1="2" x2="7.5" y2="12" stroke="currentColor" stroke-width="1.2"/>
              <line x1="10" y1="5" x2="13" y2="7" stroke="currentColor" stroke-width="1.2"/>
              <line x1="10" y1="9" x2="13" y2="7" stroke="currentColor" stroke-width="1.2"/>
            </svg>
            <span id="toggle-label">Hide text</span>
          </button>
          <span class="graph-count" id="graph-count"></span>
        </div>
        <div class="cross-note" id="cross-note" style="display:none;">
          <svg width="22" height="8">
            <line x1="0" y1="4" x2="22" y2="4" stroke="#e07b39" stroke-width="1.8" stroke-dasharray="4,2"/>
          </svg>
          shared node connections
        </div>
      </div>
      <div class="graph-viewport" id="graph-viewport">
        <div class="graph-empty" id="graph-empty">Select files to see graphs</div>
      </div>
      <div class="legend-row" id="legend-row"></div>
    </div>

  </div>
</section>

<!-- HIGHLIGHTS -->
<section class="highlights" id="highlights">
  <div class="highlights-inner">
    <div class="section-label" id="highlights-label"></div>
    <h2 id="highlights-heading"></h2>
    <div class="cards" id="highlights-cards"></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-left" id="footer-left"></div>
  <div class="footer-right" id="footer-right"></div>
</footer>

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="assets/js/datasets.js"></script>
<script src="assets/js/graph.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
